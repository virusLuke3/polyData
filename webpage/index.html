<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Polymarket预测市场实时仪表板 - 查看交易量、流动性和市场状态">
  <title>Polymarket 预测市场仪表板</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 无障碍跳转链接 -->
  <a href="#main-content" class="skip-to-content">跳转到主内容</a>
  
  <div class="dashboard-container">
    <!-- 页面标题 -->
    <header role="banner" class="dashboard-header">
      <div>
        <h1 class="dashboard-title">Polymarket 预测市场</h1>
        <p class="dashboard-subtitle">实时市场数据与分析</p>
      </div>
      <div class="stats-summary" aria-label="总体统计">
        <div class="stat-item">
          <span class="stat-label">总市场数</span>
          <span class="stat-value" id="total-markets">-</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">活跃市场</span>
          <span class="stat-value" id="active-markets">-</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">总交易量</span>
          <span class="stat-value" id="total-volume">-</span>
        </div>
      </div>
    </header>
    
    <!-- 筛选和搜索栏 -->
    <div class="controls-section" role="region" aria-label="筛选和搜索控制">
      <div class="filter-bar">
        <div class="filter-group">
          <label for="search-input" class="sr-only">搜索市场</label>
          <input 
            type="text" 
            id="search-input" 
            class="search-input" 
            placeholder="🔍 搜索市场问题..."
            aria-label="搜索市场"
          >
        </div>
        
        <div class="filter-group">
          <button 
            class="filter-button" 
            data-filter="all"
            aria-pressed="true"
            aria-label="显示所有市场"
          >
            全部
          </button>
          <button 
            class="filter-button" 
            data-filter="active"
            aria-pressed="false"
            aria-label="仅显示活跃市场"
          >
            活跃
          </button>
          <button 
            class="filter-button" 
            data-filter="closed"
            aria-pressed="false"
            aria-label="仅显示已关闭市场"
          >
            已关闭
          </button>
        </div>
        
        <div class="filter-group">
          <label for="sort-select" class="sort-label">排序:</label>
          <select 
            id="sort-select" 
            class="sort-select" 
            aria-label="选择排序方式"
          >
            <option value="volume-desc">交易量 (高到低)</option>
            <option value="volume-asc">交易量 (低到高)</option>
            <option value="liquidity-desc">流动性 (高到低)</option>
            <option value="liquidity-asc">流动性 (低到高)</option>
            <option value="date-asc">结束日期 (最近)</option>
            <option value="date-desc">结束日期 (最远)</option>
          </select>
        </div>
      </div>
    </div>
    
    <!-- 主内容区 -->
    <main id="main-content" role="main">
      <!-- 加载状态 -->
      <div id="loading-state" class="loading-state" role="status" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p>正在加载市场数据...</p>
      </div>
      
      <!-- 错误状态 -->
      <div id="error-state" class="error-state hidden" role="alert">
        <p class="error-message">⚠️ 无法加载市场数据，请稍后重试</p>
      </div>
      
      <!-- 空状态 -->
      <div id="empty-state" class="empty-state hidden" role="status">
        <p class="empty-message">未找到符合条件的市场</p>
      </div>
      
      <!-- 市场网格 -->
      <div id="markets-grid" class="market-grid hidden" role="list" aria-label="市场列表">
        <!-- 市场卡片将通过 JavaScript 动态生成 -->
      </div>
    </main>
    
    <!-- 页脚 -->
    <footer class="dashboard-footer" role="contentinfo">
      <p>数据更新时间: <span id="last-update">-</span></p>
      <p>
        <a href="https://polymarket.com" target="_blank" rel="noopener noreferrer">
          访问 Polymarket.com
        </a>
      </p>
    </footer>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
